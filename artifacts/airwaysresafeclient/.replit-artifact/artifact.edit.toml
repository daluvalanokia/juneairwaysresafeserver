kind = "web"
previewPath = "/airwaysresafeclient"
title = "AirwaysMergeSafe Client"
version = "1.0.0"

[[services]]
localPort = 3001
name = "AirwaysMergeSafeClient"
paths = ["/airwaysresafeclient"]

[services.development]
run = "PORT=3001 dotnet run --project artifacts/airwaysresafeclient/AirwaysMergeSafeClient/AirwaysMergeSafeClient.csproj"

[services.production]

[services.production.run]
args = ["dotnet", "artifacts/airwaysresafeclient/AirwaysMergeSafeClient/bin/Release/net8.0/AirwaysMergeSafeClient.dll"]

[services.production.run.env]
PORT = "3001"
